name: Publish Schema to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "schema/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy schema to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./schema
          destination_dir: schema
          keep_files: true
          enable_jekyll: false
