name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

# OIDC trusted publishing — no API token needed if you configure a
# Trusted Publisher on PyPI (https://docs.pypi.org/trusted-publishers/).
# Go to pypi.org → your project → Publishing → Add a publisher and fill in:
#   owner:      slothlabsorg (GitHub org/user)
#   repository: kraken-light
#   workflow:   publish.yml
#   environment: (leave blank, or set to "pypi" if you use one)
permissions:
  id-token: write   # required for OIDC trusted publishing
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build distribution
        working-directory: klight
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: klight/dist/
          # password: ${{ secrets.PYPI_API_TOKEN }}  # uncomment if not using OIDC
