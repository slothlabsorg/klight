apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-web
  template:
    metadata:
      labels:
        app: store-web
    spec:
      initContainers:
      - name: sentinel
        image: klight-sentinel:latest
        imagePullPolicy: Never
        env:
        - name: STARTUP_DEPENDENCIES
          value: "store-api:8080/health"
        - name: SENTINEL_TIMEOUT
          value: "120"
      containers:
      - name: store-web
        image: store-web:local
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
